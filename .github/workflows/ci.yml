name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: msh

      - name: Verify (fmt + clippy + test)
        run: ./scripts/check.sh

      - name: Build release
        run: cd msh && cargo build --release --locked

      - name: Dotfiles compat gate
        run: ./scripts/dotfiles-compat.sh --no-build
